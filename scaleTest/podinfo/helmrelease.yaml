apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: ${NAMESPACE}
  annotations:
    meta.helm.sh/release-name: podinfo
    meta.helm.sh/release-namespace: monitoring
spec:
  interval: 10m
  timeout: 15m
  releaseName: podinfo
  chart:
    spec:
      chart: podinfo
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: podinfo-repo
        namespace: ${NAMESPACE}
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    replicaCount: 2
    image:
      repository: ghcr.io/stefanprodan/podinfo
      tag: 6.5.4
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceAccount:
      create: true
      name: podinfo-sa
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/podinfo-role
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: 50m
        nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
        nginx.ingress.kubernetes.io/rate-limit: "100"
        nginx.ingress.kubernetes.io/rate-limit-window: 1m
      hosts:
        - host: podinfo.example.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: podinfo-tls
          hosts:
            - podinfo.example.com
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 80
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - podinfo
              topologyKey: kubernetes.io/hostname
    nodeSelector:
      kubernetes.io/os: linux
      node-role.kubernetes.io/worker: ""
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9898"
      prometheus.io/path: /metrics
    podLabels:
      app.kubernetes.io/part-of: podinfo-stack
      app.kubernetes.io/managed-by: flux
      team: platform-engineering
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    service:
      type: ClusterIP
      port: 9898
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    persistence:
      enabled: true
      storageClass: gp3-encrypted
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    monitoring:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
        labels:
          release: kube-prometheus-stack
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: go_.*
            action: drop
    networkPolicy:
      enabled: true
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: ingress-nginx
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: prometheus
          ports:
            - port: 9898
              protocol: TCP
      egress:
        - to:
            - namespaceSelector: {}
          ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP
            - port: 443
              protocol: TCP
