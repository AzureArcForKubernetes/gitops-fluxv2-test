spec:
  interval: 10m
  timeout: 15m
  releaseName: podinfo
  chart:
    spec:
      chart: podinfo
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: podinfo-repo
        namespace: ${NAMESPACE}
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/stefanprodan/podinfo
      tag: "6.5.4"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceAccount:
      enabled: true
      name: "podinfo"
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: podinfo.example.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: podinfo-tls
          hosts:
            - podinfo.example.com
    service:
      type: ClusterIP
      externalPort: 9898
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      cpu: 75
      memory: 80
    nodeSelector:
      kubernetes.io/os: linux
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule
    ui:
      color: "#34577c"
      message: "Scale test podinfo instance"
      logo: ""
    podAnnotations:
      scale-test.example.com/pod-meta-0001: "eza9agulm5fqjyyiir41g20dfxuj5ogqjt4ngydbnigzmk8j1923wvlcx7mm1hqb1eg4ohpn9fdlr8z1"
