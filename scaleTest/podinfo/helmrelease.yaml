    alertingRules:
      - alert: HighCPUUsage
        expr: |
          (sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace="${NAMESPACE}"}[5m])) / sum by (namespace, pod) (kube_pod_container_resource_limits{resource="cpu"}) * 100) > 37
        for: 30m
        labels:
          severity: warning
          team: platform-engineering
          runbook: https://runbooks.example.com/alerts/highcpuusage
        annotations:
          summary: "HighCPUUsage triggered for podinfo"
          description: "Alert HighCPUUsage firing for 30m. Value: {{$value|humanize}}%. Threshold: 37%."
          dashboard_url: "https://grafana.example.com/d/a6c0141cdd/podinfo?orgId=1"
      - alert: HighMemoryUsage
        expr: |
          (sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace="${NAMESPACE}"}[5m])) / sum by (namespace, pod) (kube_pod_container_resource_limits{resource="cpu"}) * 100) > 53
